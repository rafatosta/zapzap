app-id: com.rtosta.zapzap
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
base: io.qt.qtwebengine.BaseApp
base-version: "6.10"
command: zapzap

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --env=QTWEBENGINEPROCESS_PATH=/app/bin/QtWebEngineProcess

cleanup-commands:
  - /app/cleanup-BaseApp.sh

modules:
  - name: zapzap
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: dir
        path: ..
