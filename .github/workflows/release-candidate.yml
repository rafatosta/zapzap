name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      rc:
        description: "Número do release candidate. Ex.: 1"
        required: true
        default: "1"

permissions:
  contents: write

jobs:
  create-prerelease:
    runs-on: ubuntu-latest

    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release candidate tag
        id: version
        shell: bash
        run: |
          BASE_VERSION=$(python - <<'PY'
          from pathlib import Path
          import ast

          init_py = Path("zapzap") / "__init__.py"

          for node in ast.parse(init_py.read_text(encoding="utf-8")).body:
              if isinstance(node, ast.Assign):
                  for target in node.targets:
                      if isinstance(target, ast.Name) and target.id == "__version__":
                          print(ast.literal_eval(node.value))
                          raise SystemExit

          raise SystemExit("__version__ not found")
          PY
          )

          RC="${{ inputs.rc }}"
          TAG="${BASE_VERSION}-rc.${RC}"

          echo "base_version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create or update pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --prerelease \
              --latest=false \
              --title "ZapZap $TAG" \
              --notes "Release candidate generated by GitHub Actions."
          else
            git tag "$TAG"
            git push origin "$TAG"

            gh release create "$TAG" \
              --prerelease \
              --latest=false \
              --title "ZapZap $TAG" \
              --notes "Release candidate generated by GitHub Actions."
          fi

  python:
    needs: create-prerelease
    uses: ./.github/workflows/build-python.yml
    with:
      release_upload: true
      release_tag: ${{ needs.create-prerelease.outputs.release_tag }}
    secrets: inherit

  appimage:
    needs: create-prerelease
    uses: ./.github/workflows/build-appimage.yml
    with:
      release_upload: true
      release_tag: ${{ needs.create-prerelease.outputs.release_tag }}
    secrets: inherit

  snap:
    needs: create-prerelease
    uses: ./.github/workflows/build-snap.yml
    with:
      release_upload: true
      release_tag: ${{ needs.create-prerelease.outputs.release_tag }}
      publish_snap: false
    secrets: inherit

  windows:
    needs: create-prerelease
    uses: ./.github/workflows/build-windows.yml
    with:
      release_upload: true
      release_tag: ${{ needs.create-prerelease.outputs.release_tag }}
    secrets: inherit

  rpm:
    needs: create-prerelease
    uses: ./.github/workflows/build-rpm.yml
    with:
      release_upload: true
      release_tag: ${{ needs.create-prerelease.outputs.release_tag }}
    secrets: inherit

  deb:
    needs: create-prerelease
    uses: ./.github/workflows/build-deb.yml
    with:
      release_upload: true
      release_tag: ${{ needs.create-prerelease.outputs.release_tag }}
    secrets: inherit