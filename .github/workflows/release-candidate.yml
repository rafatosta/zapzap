name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da pre-release. Ex.: 6.5.2.4-rc.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-prerelease:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create or update pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --prerelease --latest=false --title "ZapZap $TAG"
          else
            git tag "$TAG"
            git push origin "$TAG"
            gh release create "$TAG" --prerelease --latest=false --title "ZapZap $TAG" --notes "Release candidate generated by GitHub Actions."
          fi

  python:
    needs: create-prerelease
    uses: ./.github/workflows/build-python.yml
    with:
      release_upload: true
      release_tag: ${{ inputs.tag }}
    secrets: inherit
