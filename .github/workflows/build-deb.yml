name: Build DEB

on:
  workflow_call:
    inputs:
      mode:
        required: false
        type: string
        default: test
      version:
        required: false
        type: string
        default: ""
      publish:
        required: false
        type: boolean
        default: false

  workflow_dispatch:
    inputs:
      mode:
        description: "Build mode"
        required: true
        default: test
        type: choice
        options:
          - test
          - deploy
      version:
        description: "Version override. Empty = zapzap/__init__.py"
        required: false
        type: string
      publish:
        description: "Attach artifact to GitHub Release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pkgforge-dev/archlinux:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version and channel
        id: meta
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            BASE_VERSION="${{ inputs.version }}"
          else
            BASE_VERSION=$(python - <<'PY'
          from pathlib import Path
          import ast

          init_py = Path("zapzap") / "__init__.py"
          for node in ast.parse(init_py.read_text(encoding="utf-8")).body:
              if isinstance(node, ast.Assign):
                  for target in node.targets:
                      if isinstance(target, ast.Name) and target.id == "__version__":
                          print(ast.literal_eval(node.value))
                          raise SystemExit
          raise SystemExit("__version__ not found")
          PY
          )
          fi

          if [ "${{ inputs.mode }}" = "deploy" ]; then
            CHANNEL="Official"
            ARTIFACT_VERSION="$BASE_VERSION"
            DEB_VERSION="$BASE_VERSION"
          else
            CHANNEL="Test"
            ARTIFACT_VERSION="${BASE_VERSION}-test.${GITHUB_RUN_NUMBER}"
            DEB_VERSION="${BASE_VERSION}~test${GITHUB_RUN_NUMBER}"
          fi

          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact_version=$ARTIFACT_VERSION" >> "$GITHUB_OUTPUT"
          echo "deb_version=$DEB_VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Preparing Container
        uses: pkgforge-dev/anylinux-setup-action@v2

      - name: Create BuildInfo.py
        shell: bash
        run: |
          cat > zapzap/BuildInfo.py <<EOF_BUILD_INFO
          BUILD_CHANNEL = "${{ steps.meta.outputs.channel }}"
          BUILD_PROVIDER = "GitHub Actions"
          BUILD_REPOSITORY = "${{ github.repository }}"
          BUILD_PACKAGING = "DEB"
          BUILD_VERSION = "${{ steps.meta.outputs.artifact_version }}"
          EOF_BUILD_INFO

      - name: Build Environment
        run: |
          chmod +x ./builders/anylinux-appimage/get-dependencies.sh
          ./builders/anylinux-appimage/get-dependencies.sh

      - name: Create AppDir
        run: |
          chmod +x ./builders/anylinux-appimage/make-appimage.sh
          export GITHUB_REPOSITORY="${{ github.repository }}"
          ./builders/anylinux-appimage/make-appimage.sh

      - name: Install Debian Tools
        run: pacman -Syu --noconfirm dpkg

      - name: Create DEB Structure
        shell: bash
        run: |
          mkdir -p package/DEBIAN
          mkdir -p package/opt/zapzap
          mkdir -p package/usr/bin
          mkdir -p package/usr/share/applications
          mkdir -p package/usr/share/icons/hicolor/scalable/apps

          cp -a AppDir/. package/opt/zapzap/

          cat > package/usr/bin/zapzap <<'EOF_LAUNCHER'
          #!/bin/sh
          exec /opt/zapzap/AppRun "$@"
          EOF_LAUNCHER
          chmod 755 package/usr/bin/zapzap

          cp share/applications/com.rtosta.zapzap.desktop package/usr/share/applications/
          cp share/icons/com.rtosta.zapzap.svg package/usr/share/icons/hicolor/scalable/apps/com.rtosta.zapzap.svg

          printf '%s\n' \
            "Package: zapzap" \
            "Version: ${{ steps.meta.outputs.deb_version }}" \
            "Section: network" \
            "Priority: optional" \
            "Architecture: amd64" \
            "Maintainer: Rafael Tosta" \
            "Depends: libc6" \
            "Description: WhatsApp Messenger for Linux" \
            " Progressive Web App wrapper for WhatsApp." \
            " ." \
            " Native WhatsApp Web client for Linux built with PyQt6." \
            > package/DEBIAN/control

          nl -ba package/DEBIAN/control

      - name: Build DEB
        run: dpkg-deb --root-owner-group --build package "ZapZap-${{ steps.meta.outputs.artifact_version }}-linux-amd64.deb"

      - name: Verify DEB
        shell: bash
        run: |
          dpkg-deb --info "ZapZap-${{ steps.meta.outputs.artifact_version }}-linux-amd64.deb"
          dpkg-deb --contents "ZapZap-${{ steps.meta.outputs.artifact_version }}-linux-amd64.deb" | head -200
          test -x package/opt/zapzap/AppRun
          echo "AppRun OK"

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZapZap-DEB-linux-amd64-${{ steps.meta.outputs.artifact_version }}
          path: ZapZap-${{ steps.meta.outputs.artifact_version }}-linux-amd64.deb

      - name: Release DEB artifact
        if: ${{ inputs.publish == true }}
        uses: softprops/action-gh-release@v2
        with:
          files: ZapZap-${{ steps.meta.outputs.artifact_version }}-linux-amd64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
