name: Test Packaging

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Base version for test artifacts. Empty = zapzap/__init__.py"
        required: false
        type: string
      python_version:
        description: "Python version"
        required: true
        default: "3.14"
        type: string
  
  push:
    tags:
      - "t*"

  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  PYTHON_VERSION: ${{ inputs.python_version || '3.14' }}

jobs:
  python:
    name: Test Python Package
    uses: ./.github/workflows/build-python.yml
    with:
      mode: test
      version: ${{ inputs.version || '' }}
      python_version: ${{ inputs.python_version || '3.14' }}
      publish: false
    secrets: inherit

  windows:
    name: Test Windows
    uses: ./.github/workflows/build-windows.yml
    with:
      mode: test
      version: ${{ inputs.version || '' }}
      python_version: ${{ inputs.python_version || '3.14' }}
      publish: false
    secrets: inherit

  appimage:
    name: Test AppImage
    uses: ./.github/workflows/build-appimage.yml
    with:
      mode: test
      version: ${{ inputs.version || '' }}
      publish: false
    secrets: inherit

  snap:
    name: Test Snap
    uses: ./.github/workflows/build-snap.yml
    with:
      mode: test
      version: ${{ inputs.version || '' }}
      publish: false
      publish_store: false
    secrets: inherit

  deb:
    name: Test DEB
    uses: ./.github/workflows/build-deb.yml
    with:
      mode: test
      version: ${{ inputs.version || '' }}
      publish: false
    secrets: inherit
