name: Build AppImage

on:
  workflow_call:
    inputs:
      mode:
        required: false
        type: string
        default: test
      version:
        required: false
        type: string
        default: ""
      publish:
        required: false
        type: boolean
        default: false

  workflow_dispatch:
    inputs:
      mode:
        description: "Build mode"
        required: true
        default: test
        type: choice
        options:
          - test
          - deploy
      version:
        description: "Version override. Empty = zapzap/__init__.py"
        required: false
        type: string
      publish:
        description: "Attach artifact to GitHub Release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-appimage:
    name: AppImage ${{ matrix.arch }}
    runs-on: ${{ matrix.runs-on }}
    container: ghcr.io/pkgforge-dev/archlinux:latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            arch: x86_64
          - runs-on: ubuntu-24.04-arm
            arch: aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version and channel
        id: meta
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            BASE_VERSION="${{ inputs.version }}"
          else
            BASE_VERSION=$(python - <<'PY'
          from pathlib import Path
          import ast

          init_py = Path("zapzap") / "__init__.py"
          for node in ast.parse(init_py.read_text(encoding="utf-8")).body:
              if isinstance(node, ast.Assign):
                  for target in node.targets:
                      if isinstance(target, ast.Name) and target.id == "__version__":
                          print(ast.literal_eval(node.value))
                          raise SystemExit
          raise SystemExit("__version__ not found")
          PY
          )
          fi

          if [ "${{ inputs.mode }}" = "deploy" ]; then
            CHANNEL="Official"
            ARTIFACT_VERSION="$BASE_VERSION"
          else
            CHANNEL="Test"
            ARTIFACT_VERSION="${BASE_VERSION}-test.${GITHUB_RUN_NUMBER}"
          fi

          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact_version=$ARTIFACT_VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Create BuildInfo.py
        shell: bash
        run: |
          cat > zapzap/BuildInfo.py <<EOF_BUILD_INFO
          BUILD_CHANNEL = "${{ steps.meta.outputs.channel }}"
          BUILD_PROVIDER = "GitHub Actions"
          BUILD_REPOSITORY = "${{ github.repository }}"
          BUILD_PACKAGING = "AppImage"
          BUILD_VERSION = "${{ steps.meta.outputs.artifact_version }}"
          EOF_BUILD_INFO

      - name: Preparing Container
        uses: pkgforge-dev/anylinux-setup-action@v2

      - name: Install dependencies
        run: /bin/sh ./builders/anylinux-appimage/get-dependencies.sh

      - name: Find dictionaries
        run: find . -name "*.bdic" | sort

      - name: Make AppImage
        run: /bin/sh ./builders/anylinux-appimage/make-appimage.sh

      - name: Normalize AppImage artifact names
        shell: bash
        run: |
          mkdir -p dist-normalized
          APPIMAGE_NAME="ZapZap-${{ steps.meta.outputs.artifact_version }}-linux-${{ matrix.arch }}.AppImage"

          appimage=$(find dist -maxdepth 1 -name "*.AppImage" -print -quit)
          test -n "$appimage"
          cp "$appimage" "dist-normalized/${APPIMAGE_NAME}"

          zsync=$(find dist -maxdepth 1 -name "*.zsync" -print -quit || true)
          if [ -n "$zsync" ]; then
            cp "$zsync" "dist-normalized/${APPIMAGE_NAME}.zsync"
          fi

      - name: List generated files
        run: ls -lah dist-normalized/

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZapZap-AppImage-${{ matrix.arch }}-${{ steps.meta.outputs.artifact_version }}
          path: dist-normalized/*

      - name: Release AppImage artifact
        if: ${{ inputs.publish == true }}
        uses: softprops/action-gh-release@v2
        with:
          files: dist-normalized/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
