name: Deploy Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Official release version. Empty = zapzap/__init__.py or tag name without v"
        required: false
        type: string
      python_version:
        description: "Python version"
        required: true
        default: "3.14"
        type: string
      publish_snap_store:
        description: "Upload Snap to Snap Store stable"
        required: true
        default: false
        type: boolean

  push:
    tags:
      - "*"
      - "!t*"

  release:
    types:
      - published

permissions:
  contents: write

env:
  PYTHON_VERSION: ${{ inputs.python_version || '3.14' }}

jobs:
  resolve-version:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version || '' }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(python - <<'PY'
          from pathlib import Path
          import ast

          init_py = Path("zapzap") / "__init__.py"
          for node in ast.parse(init_py.read_text(encoding="utf-8")).body:
              if isinstance(node, ast.Assign):
                  for target in node.targets:
                      if isinstance(target, ast.Name) and target.id == "__version__":
                          print(ast.literal_eval(node.value))
                          raise SystemExit
          raise SystemExit("__version__ not found")
          PY
          )
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploy version: $VERSION"

  python:
    name: Build Python Package
    needs: resolve-version
    uses: ./.github/workflows/build-python.yml
    with:
      mode: deploy
      version: ${{ needs.resolve-version.outputs.version }}
      python_version: ${{ inputs.python_version || '3.14' }}
      publish: false
    secrets: inherit

  windows:
    name: Build Windows
    needs: resolve-version
    uses: ./.github/workflows/build-windows.yml
    with:
      mode: deploy
      version: ${{ needs.resolve-version.outputs.version }}
      python_version: ${{ inputs.python_version || '3.14' }}
      publish: false
    secrets: inherit

  appimage:
    name: Build AppImage
    needs: resolve-version
    uses: ./.github/workflows/build-appimage.yml
    with:
      mode: deploy
      version: ${{ needs.resolve-version.outputs.version }}
      publish: false
    secrets: inherit

  snap:
    name: Build Snap
    needs: resolve-version
    uses: ./.github/workflows/build-snap.yml
    with:
      mode: deploy
      version: ${{ needs.resolve-version.outputs.version }}
      publish: false
      publish_store: ${{ inputs.publish_snap_store == true || github.event_name == 'release' }}
    secrets: inherit

  deb:
    name: Build DEB
    needs: resolve-version
    uses: ./.github/workflows/build-deb.yml
    with:
      mode: deploy
      version: ${{ needs.resolve-version.outputs.version }}
      publish: false
    secrets: inherit

  publish-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - python
      - windows
      - appimage
      - snap
      - deb

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ZapZap-*
          path: dist
          merge-multiple: true

      - name: List release artifacts
        run: find dist -maxdepth 2 -type f -print | sort

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.resolve-version.outputs.version }}
          name: ZapZap ${{ needs.resolve-version.outputs.version }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
