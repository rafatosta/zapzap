name: Build macOS

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      release_upload:
        required: false
        type: boolean
        default: false
      release_tag:
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      PYTHON_VERSION: "3.10"
      PYTHONUTF8: 1
    steps:
      - uses: actions/checkout@v4
      - name: Set packaging scripts executable
        run: |
          chmod +x .github/packaging/common/build-info.sh
          chmod +x .github/packaging/macos/build.sh
      - name: Create BuildInfo.py
        shell: bash
        run: .github/packaging/common/build-info.sh "macOS"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Build macOS DMG
        shell: bash
        run: .github/packaging/macos/build.sh
      - name: Upload artifact
        if: ${{ !inputs.release_upload }}
        uses: actions/upload-artifact@v4
        with:
          name: ZapZap-macOS-universal
          path: dist/ZapZap-*-macos-universal.dmg
      - name: Upload to release
        if: ${{ inputs.release_upload }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: dist/ZapZap-*-macos-universal.dmg
