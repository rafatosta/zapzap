name: Build and Release Zapzap

on:
  workflow_dispatch:
     inputs:
      publish:
        description: "Criar release?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  release:
    types: [created]

  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.14"

jobs:
# ==========================================================
# PYTHON PACKAGE
# ==========================================================

  build-python:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create BuildInfo.py
        shell: bash
        run: |
          cat > zapzap/BuildInfo.py << EOF
          BUILD_CHANNEL = "Official"
          BUILD_PROVIDER = "GitHub Actions"
          BUILD_REPOSITORY = "${{ github.repository }}"
          EOF

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Build wheel
        run: |
          python -m build --wheel --outdir dist

      - name: List generated files
        run: |
          ls -lah dist/

      # ======================================================
      # Manual execution -> upload artifact only
      # ======================================================

      - name: Upload Python artifact
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ZapZap-Python
          path: dist/*.whl

      # ======================================================
      # Release/tag -> publish release
      # ======================================================

      - name: Release Python artifacts
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ==========================================================
# WINDOWS
# ==========================================================

  build-windows:
    runs-on: windows-latest

    env:
      PYTHONUTF8: 1

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create BuildInfo.py
        shell: bash
        run: |
          cat > zapzap/BuildInfo.py << EOF
          BUILD_CHANNEL = "Official"
          BUILD_PROVIDER = "GitHub Actions"
          BUILD_REPOSITORY = "${{ github.repository }}"
          EOF

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Windows executable
        run: |
          python -m builders.windows_builder

      - name: List generated files
        run: |
          dir dist

      # ======================================================
      # Manual execution -> upload artifact only
      # ======================================================

      - name: Upload Windows artifact
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ZapZap-Windows
          path: dist/ZapZap-Windows.zip

      # ======================================================
      # Release/tag -> publish release
      # ======================================================

      - name: Release Windows artifacts
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ZapZap-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ==========================================================
# ANYLINUX APPIMAGE (sharun + uruntime)
# ==========================================================

  build-anylinux-appimage:
    name: "${{ matrix.name }} (${{ matrix.arch }})"
    runs-on: ${{ matrix.runs-on }}

    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            name: Build AppImage
            arch: x86_64

          - runs-on: ubuntu-24.04-arm
            name: Build AppImage
            arch: aarch64

    container: ghcr.io/pkgforge-dev/archlinux:latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create BuildInfo.py
        shell: bash
        run: |
          cat > zapzap/BuildInfo.py << EOF
          BUILD_CHANNEL = "Official"
          BUILD_PROVIDER = "GitHub Actions"
          BUILD_REPOSITORY = "${{ github.repository }}"
          EOF

      - name: Preparing Container
        uses: pkgforge-dev/anylinux-setup-action@v2

      - name: Install Dependencies
        run: |
          /bin/sh ./builders/anylinux-appimage/get-dependencies.sh
      
      - name: Find dictionaries
        run: |
          find . -name "*.bdic" | sort

      - name: Make AppImage
        run: |
          /bin/sh ./builders/anylinux-appimage/make-appimage.sh

      - name: List generated files
        run: |
          ls -lah dist/

      # ======================================================
      # Manual execution -> upload artifact only
      # ======================================================

      - name: Upload AnyLinux artifact
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ZapZap-Anylinux-AppImage-${{ matrix.arch }}
          path: dist/*.AppImage

      # ======================================================
      # Release/tag -> publish release
      # ======================================================

      - name: Release AnyLinux AppImage artifacts
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.AppImage
            dist/*.zsync
            
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}