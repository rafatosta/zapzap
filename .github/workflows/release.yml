name: Build and Release Zapzap

on:
  workflow_dispatch:
     inputs:
      publish:
        description: "Criar release?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  release:
    types: [created]

  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.14"

jobs:
# ==========================================================
# PYTHON PACKAGE
# ==========================================================

  build-python:
    runs-on: ubuntu-latest

    steps:

      - name: Create BuildInfo.py
        shell: bash
        run: |
          cat > zapzap/BuildInfo.py << EOF
          BUILD_CHANNEL = "Official"
          BUILD_PROVIDER = "GitHub Actions"
          BUILD_REPOSITORY = "${{ github.repository }}"
          BUILD_COMMIT = "${{ github.sha }}"
          BUILD_REF = "${{ github.ref_name }}"
          BUILD_RUN_ID = "${{ github.run_id }}"
          EOF

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Build wheel
        run: |
          python -m build --wheel --outdir dist

      - name: List generated files
        run: |
          ls -lah dist/

      # ======================================================
      # Manual execution -> upload artifact only
      # ======================================================

      - name: Upload Python artifact
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ZapZap-Python
          path: dist/*.whl

      # ======================================================
      # Release/tag -> publish release
      # ======================================================

      - name: Release Python artifacts
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ==========================================================
# WINDOWS
# ==========================================================

  build-windows:
    runs-on: windows-latest

    env:
      PYTHONUTF8: 1

    steps:

      - name: Create BuildInfo.py
        shell: bash
        run: |
          cat > zapzap/BuildInfo.py << EOF
          BUILD_CHANNEL = "Official"
          BUILD_PROVIDER = "GitHub Actions"
          BUILD_REPOSITORY = "${{ github.repository }}"
          BUILD_COMMIT = "${{ github.sha }}"
          BUILD_REF = "${{ github.ref_name }}"
          BUILD_RUN_ID = "${{ github.run_id }}"
          EOF

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Windows executable
        run: |
          python -m builders.windows_builder

      - name: List generated files
        run: |
          dir dist

      # ======================================================
      # Manual execution -> upload artifact only
      # ======================================================

      - name: Upload Windows artifact
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ZapZap-Windows
          path: dist/ZapZap-Windows.zip

      # ======================================================
      # Release/tag -> publish release
      # ======================================================

      - name: Release Windows artifacts
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ZapZap-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ==========================================================
# APPIMAGE
# ==========================================================

  build-appimage:
    runs-on: ubuntu-24.04

    env:
      PYTHONUTF8: 1

    steps:
      - name: Create BuildInfo.py
        shell: bash
        run: |
          cat > zapzap/BuildInfo.py << EOF
          BUILD_CHANNEL = "Official"
          BUILD_PROVIDER = "GitHub Actions"
          BUILD_REPOSITORY = "${{ github.repository }}"
          BUILD_COMMIT = "${{ github.sha }}"
          BUILD_REF = "${{ github.ref_name }}"
          BUILD_RUN_ID = "${{ github.run_id }}"
          EOF

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            build-essential \
            python3-dev \
            pkg-config \
            patchelf \
            desktop-file-utils \
            fuse \
            wget \
            unzip \
            curl \
            libdbus-1-dev \
            libdbus-glib-1-dev \
            libglib2.0-dev \
            libegl1 \
            libopengl0 \
            libxkbcommon-x11-0 \
            libnss3 \
            libxss1 \
            libasound2t64

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Show versions
        run: |
          python --version
          pip show PyQt6
          pip show PyQt6-WebEngine
          pip show PyInstaller

      - name: Define version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          else
            echo "VERSION=dev" >> $GITHUB_ENV
          fi

      - name: Build AppImage
        run: |
          python -m builders.appimage_builder ${{ env.VERSION }}

      - name: List generated files
        run: |
          ls -lah dist/

      # ======================================================
      # Manual execution -> upload artifact only
      # ======================================================

      - name: Upload AppImage artifact
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ZapZap-AppImage
          path: dist/*.AppImage

      # ======================================================
      # Release/tag -> publish release
      # ======================================================

      - name: Release AppImage artifacts
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}